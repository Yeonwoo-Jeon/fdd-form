const https = require('https');

exports.handler = async (event) => {
  if (event.httpMethod === 'OPTIONS') {
    return {
      statusCode: 200,
      headers: {
        'Access-Control-Allow-Origin': '*',
        'Access-Control-Allow-Methods': 'POST, OPTIONS',
        'Access-Control-Allow-Headers': 'Content-Type'
      },
      body: ''
    };
  }

  if (event.httpMethod !== 'POST') {
    return { statusCode: 405, body: 'Method Not Allowed' };
  }

  const NOTION_TOKEN = process.env.NOTION_TOKEN;
  const DATABASE_ID = process.env.NOTION_DATABASE_ID;

  let data;
  try {
    data = JSON.parse(event.body);
  } catch (e) {
    return { statusCode: 400, body: 'Invalid JSON' };
  }

  const txt = (value) => ({
    rich_text: [{ text: { content: String(value || '-') } }]
  });

  const properties = {
    "이름": {
      title: [{ text: { content: String(data.brand || '미입력') } }]
    },
    "사업자유형":     txt(data.bizType),
    "법인명":         txt(data.company),
    "사업자등록번호": txt(data.bizno),
    "소재지주소":     txt(data.addr),
    "대표자":         txt(data.ceoName),
    "대표전화":       txt(data.tel),
    "이메일":         txt(data.email),
    "담당자":         txt(data.mgrName),
    "담당자이메일":   txt(data.mgrEmail),
    "가맹금보호방식": txt(data.escrowType),
    "최초계약기간":   txt(data.contractInit ? data.contractInit + '년' : '-'),
    "영업지역":       txt(data.territoryType && data.territoryDist ? `${data.territoryType} ${data.territoryDist}m` : '-'),
    "가맹비":         txt(data.feeInitial),
    "교육비":         txt(data.feeEdu),
    "로열티유형":     txt(data.royaltyType),
    "제출자":         txt(data.submitter),
    "제출일":         txt(data.submitDate),
  };

  const body = JSON.stringify({
    parent: { database_id: DATABASE_ID },
    properties
  });

  return new Promise((resolve) => {
    const req = https.request({
      hostname: 'api.notion.com',
      path: '/v1/pages',
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${NOTION_TOKEN}`,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28',
        'Content-Length': Buffer.byteLength(body)
      }
    }, (res) => {
      let responseData = '';
      res.on('data', chunk => responseData += chunk);
      res.on('end', () => {
        if (res.statusCode === 200 || res.statusCode === 201) {
          resolve({
            statusCode: 200,
            headers: { 'Access-Control-Allow-Origin': '*' },
            body: JSON.stringify({ ok: true })
          });
        } else {
          resolve({
            statusCode: res.statusCode,
            headers: { 'Access-Control-Allow-Origin': '*' },
            body: JSON.stringify({ ok: false, error: responseData })
          });
        }
      });
    });
    req.on('error', (e) => {
      resolve({
        statusCode: 500,
        headers: { 'Access-Control-Allow-Origin': '*' },
        body: JSON.stringify({ ok: false, error: e.message })
      });
    });
    req.write(body);
    req.end();
  });
};
